<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Landing Page</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f8f9fa;
}
.hero{
    background:#0d6efd;
    color:white;
    padding:80px 0;
}
.section-title{
    margin:60px 0 30px 0;
}
</style>

</head>
<body>


<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">ShopZone</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end text-bg-dark" id="offcanvasMenu">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>

  </div>
</nav>

<div style="margin-top:70px;"></div>

<!-- ✅ Hero Section -->
<section class="hero text-center">
  <div class="container">
    <h1>Welcome to ShopZone</h1>
    <p>Best Deals on Electronics & Accessories</p>
    <button class="btn btn-light btn-lg">Shop Now</button>
  </div>
</section>
  
<div class="container mt-5">
  <h2 class="text-center section-title">Featured Products</h2>

  <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="https://via.placeholder.com/1200x400" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://via.placeholder.com/1200x400/ff7f7f" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://via.placeholder.com/1200x400/87ceeb" class="d-block w-100">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</div>

<div class="container">
  <h2 class="text-center section-title">Our Products</h2>

  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Smartphone</h5>
          <p class="card-text">$499</p>
          <button class="btn btn-primary">Buy Now</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Laptop</h5>
          <p class="card-text">$899</p>
          <button class="btn btn-primary">Buy Now</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Headphones</h5>
          <p class="card-text">$199</p>
          <button class="btn btn-primary">Buy Now</button>
        </div>
      </div>
    </div>

  </div>
</div>


<div class="container text-center mt-5 mb-5">
  <h2 class="section-title">Subscribe to Newsletter</h2>

  <form class="row g-3 justify-content-center">
    <div class="col-md-6">
      <input type="email" class="form-control" placeholder="Enter your email">
    </div>
    <div class="col-md-2">
      <button class="btn btn-success w-100">Subscribe</button>
    </div>
  </form>
</div>

<footer class="bg-dark text-white text-center p-3">
  © 2026 ShopZone | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
